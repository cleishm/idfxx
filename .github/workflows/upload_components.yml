name: Upload Components

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Validate uploads without publishing (verifies OIDC + trusted uploader)'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover components in topological order
        id: discover
        run: |
          list=$(python3 scripts/component-order.py --paths)
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$list" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload components to ESP Component Registry
        uses: espressif/upload-components-ci-action@v2
        with:
          namespace: cleishm
          components: ${{ steps.discover.outputs.list }}
          dry_run: ${{ inputs.dry_run || '' }}
