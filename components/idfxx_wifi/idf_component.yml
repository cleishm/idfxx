version: "1.0.1"
description: "Type-safe WiFi station management for ESP32"
url: "https://github.com/cleishm/idfxx/tree/main/components/idfxx_wifi"
repository: "https://github.com/cleishm/idfxx.git"
license: "Apache-2.0"
dependencies:
  idf: ">=5.5"
  cleishm/idfxx_core:
    version: "^1.0.0"
    public: true
    override_path: ../idfxx_core
  cleishm/idfxx_event:
    version: "^1.0.0"
    public: true
    override_path: ../idfxx_event
  cleishm/idfxx_hw_support:
    version: "^1.0.0"
    public: true
    override_path: ../idfxx_hw_support
  cleishm/idfxx_netif:
    version: "^1.0.0"
    public: true
    override_path: ../idfxx_netif
targets:
  - esp32
  - esp32s2
  - esp32s3
  - esp32c3
  - esp32c6
  - esp32h2
