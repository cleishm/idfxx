version: "1.0.0"
description: "GPIO push-button driver with debounce and event detection"
url: "https://github.com/cleishm/idfxx/tree/main/components/idfxx_button"
repository: "https://github.com/cleishm/idfxx.git"
license: "Apache-2.0"
dependencies:
  idf: ">=5.5"
  cleishm/idfxx_core:
    version: "^1.0.0"
    public: true
    override_path: ../idfxx_core
  cleishm/idfxx_gpio:
    version: "^1.0.0"
    public: true
    override_path: ../idfxx_gpio
  cleishm/idfxx_timer:
    version: "^1.0.0"
    override_path: ../idfxx_timer
targets:
  - esp32
  - esp32s2
  - esp32s3
  - esp32c3
  - esp32c6
  - esp32h2
